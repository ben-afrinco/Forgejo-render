# ============================================================
# ⚠️ FORGEJO ON RENDER FREE TIER - EXPERIMENTAL ONLY
# ============================================================
# التحذيرات:
# 1. لا يوجد قرص دائم - كل البيانات تُفقد عند إعادة النشر
# 2. الخدمة تتوقف بعد 15 دقيقة من عدم الاستخدام
# 3. SQLite قاعدة البيانات (بطيئة وغير موصى بها للإنتاج)
# 4. 512MB RAM فقط
# 
# الاستخدام: تجربة Forgejo فقط - لا تخزن بيانات مهمة!
# ============================================================

services:
  - type: web
    name: forgejo-free
    runtime: image
    image:
      url: codeberg.org/forgejo/forgejo:15-rootless
    plan: free
    region: oregon
    healthCheckPath: /
    
    envVars:
      # ━━ إعدادات الويب ━━
      - key: FORGEJO__server__ROOT_URL
        fromService:
          name: forgejo-free
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: FORGEJO__server__HTTP_PORT
        value: "3000"
      - key: FORGEJO__server__DOMAIN
        fromService:
          name: forgejo-free
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: FORGEJO__server__PROTOCOL
        value: https
      - key: FORGEJO__server__ENABLE_GZIP
        value: "true"

      # ━━ قاعدة البيانات: SQLite (الافتراضي في Free Tier) ━━
      # لا حاجة لإعدادات - Forgejo يستخدم SQLite تلقائياً
      # عند عدم وجود متغيرات database

      # ━━ الأمان ━━
      - key: FORGEJO__security__SECRET_KEY
        generateValue: true
      - key: FORGEJO__security__INTERNAL_TOKEN
        generateValue: true
      - key: FORGEJO__security__INSTALL_LOCK
        value: "false"          # ← false للإعداد الأولي عبر الويب
      - key: FORGEJO__security__REVERSE_PROXY_TRUSTED_PROXIES
        value: "127.0.0.0/8,::1/128"

      # ━━ المستخدم (rootless image) ━━
      - key: USER_UID
        value: "1000"
      - key: USER_GID
        value: "1000"

      # ━━ تقليل استهلاك الذاكرة ━━
      - key: FORGEJO__cache__ADAPTER
        value: memory
      - key: FORGEJO__cache__INTERVAL
        value: "60"
      - key: FORGEJO__repository__PREFERRED_LICENSES
        value: "MIT,Apache-2.0"

      # ━━ تعطيل ميزات ثقيلة لتوفير RAM ━━
      - key: FORGEJO__actions__ENABLED
        value: "false"          # ← تعطيل CI/CD لتوفير الذاكرة
      - key: FORGEJO__packages__ENABLED
        value: "false"          # ← تعطيل سجل الحزم

      # ━━ اسم التطبيق ━━
      - key: FORGEJO____APP_NAME
        value: "Forgejo Free Tier (Experimental)"

# ❌ لا يوجد قسم databases في Free Tier
# ❌ لا يوجد قسم disk في Free Tier
