services:
  - type: web
    name: forgejo-server
    runtime: docker
    plan: free
    repo: https://github.com/ben-afrinco/Forgejo-render.git
    branch: main
    region: frankfurt
    healthCheckPath: /api/v1/version
    
    envVars:
      # ✅ المتغيرات من envVarGroup
      - fromGroup: forgejo-common

      # ✅ متغيرات قاعدة البيانات (من الـ service مباشرة، ليس من الـ group)
      - key: FORGEJO_DB_HOST
        fromDatabase:
          name: forgejo-db
          property: host
      - key: FORGEJO_DB_NAME
        fromDatabase:
          name: forgejo-db
          property: database
      - key: FORGEJO_DB_USER
        fromDatabase:
          name: forgejo-db
          property: user
      - key: FORGEJO_DB_PASSWORD
        fromDatabase:
          name: forgejo-db
          property: password

      # ✅ الأسرار
      - key: FORGEJO__security__SECRET_KEY
        generateValue: true
      - key: FORGEJO__security__INTERNAL_TOKEN
        generateValue: true

      # ✅ متغيرات النظام
      - key: USER_UID
        value: "1000"
      - key: USER_GID
        value: "1000"
      - key: GOMEMLIMIT
        value: "400MiB"
      - key: GOGC
        value: "50"
      - key: FORGEJO_WORK_DIR
        value: /data
      - key: FORGEJO_CUSTOM
        value: /data/gitea

databases:
  - name: forgejo-db
    plan: free
    databaseName: forgejo
    user: forgejo
    region: frankfurt
    postgresMajorVersion: "16"

# ✅ envVarGroups على مستوى الجذر فقط
envVarGroups:
  - name: forgejo-common
    envVars:
      - key: FORGEJO__server__HTTP_PORT
        value: "3000"
      - key: FORGEJO__server__PROTOCOL
        value: http
