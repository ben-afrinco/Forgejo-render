# ============================================================
# Forgejo on Render - Blueprint Configuration (Fixed)
# ============================================================

services:
  - type: web
    name: forgejo
    runtime: image
    image:
      url: codeberg.org/forgejo/forgejo:15-rootless
    plan: standard
    region: frankfurt
    healthCheckPath: /api/healthz
    numInstances: 1
    
    disk:
      name: forgejo-data
      mountPath: /var/lib/gitea
      sizeGB: 20
    
    envVars:
      # ━━ قاعدة البيانات ━━
      - key: FORGEJO__database__DB_TYPE
        value: postgres
      - key: FORGEJO__database__HOST
        fromDatabase:
          name: forgejo-db
          property: host
      - key: FORGEJO__database__PORT
        fromDatabase:
          name: forgejo-db
          property: port
      - key: FORGEJO__database__NAME
        fromDatabase:
          name: forgejo-db
          property: database
      - key: FORGEJO__database__USER
        fromDatabase:
          name: forgejo-db
          property: user
      - key: FORGEJO__database__PASSWD
        fromDatabase:
          name: forgejo-db
          property: password
      - key: FORGEJO__database__SSL_MODE
        value: require

      # ━━ إعدادات الويب ━━
      - key: FORGEJO__server__ROOT_URL
        fromService:
          name: forgejo
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: FORGEJO__server__HTTP_PORT
        value: "3000"
      - key: FORGEJO__server__DOMAIN
        fromService:
          name: forgejo
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: FORGEJO__server__PROTOCOL
        value: https
      - key: FORGEJO__server__ENABLE_GZIP
        value: "true"

      # ━━ الأمان ━━
      - key: FORGEJO__security__SECRET_KEY
        generateValue: true
      - key: FORGEJO__security__INTERNAL_TOKEN
        generateValue: true
      - key: FORGEJO__security__REVERSE_PROXY_TRUSTED_PROXIES
        value: "127.0.0.0/8,::1/128"
      - key: FORGEJO__security__INSTALL_LOCK
        value: "true"

      # ━━ المستخدم (rootless) ━━
      - key: USER_UID
        value: "1000"
      - key: USER_GID
        value: "1000"

      # ━━ التخزين المؤقت ━━
      - key: FORGEJO__cache__ADAPTER
        value: memory
      - key: FORGEJO__cache__INTERVAL
        value: "60"

      # ━━ المستودعات ━━
      - key: FORGEJO__repository__DEFAULT_BRANCH
        value: main
      - key: FORGEJO__repository__PREFERRED_LICENSES
        value: "MIT,Apache-2.0,GPL-3.0,BSD-3-Clause"

      # ━━ Actions (CI/CD) ━━
      - key: FORGEJO__actions__ENABLED
        value: "true"

      # ━━ سجل الحزم ━━
      - key: FORGEJO__packages__ENABLED
        value: "true"

      # ━━ اسم التطبيق ━━
      - key: FORGEJO____APP_NAME
        value: "My Forgejo Server"

databases:
  - name: forgejo-db
    databaseName: forgejo
    user: forgejo
    plan: basic-256mb
    region: frankfurt
    ipAllowList: []
